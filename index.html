<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f1f5f9; font-family: -apple-system, system-ui, sans-serif; }
textarea, input { font-family: monospace; outline: none; font-size: 16px !important; }
button { font-family: -apple-system, system-ui, sans-serif; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── constants ─────────────────────────────────────────────────────────────────
// Days 1-31 = current month, days 32-62 = next month (day 32 = 1st of next month)
const NEXT_MONTH_OFFSET = 31;
const MONTHS = "JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC";
const DATE_RE = new RegExp("(\\d{1,2})(" + MONTHS + ")", "i");
const MONTH_MAP = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
const MONTH_NAMES = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

// ── helpers ───────────────────────────────────────────────────────────────────
function tripDays(start, length) { return Array.from({ length }, (_, i) => start + i); }
function getNet(grid, d) { return grid[d] ? grid[d].net : 0; }
function getBuffer(grid, d) { return grid[d] ? grid[d].net - grid[d].minReq : 0; }
function scoreTrip(start, length, grid) { return tripDays(start, length).reduce((s, d) => s + getNet(grid, d), 0); }
function hasOverlap(trips) { const all = trips.flatMap(t => tripDays(t.start, t.length)); return new Set(all).size !== all.length; }
function maxConsecutive(trips, fixedDays) {
  const w = new Set([...trips.flatMap(t => tripDays(t.start, t.length)), ...fixedDays]);
  let max = 0, cur = 0;
  for (let d = 1; d <= 62; d++) { if (w.has(d)) { cur++; max = Math.max(max, cur); } else cur = 0; }
  return max;
}

function formatDay(d, month1Name, month2Name) {
  if (d <= 31) return d + (month1Name ? " " + month1Name : "");
  return (d - NEXT_MONTH_OFFSET) + (month2Name ? " " + month2Name : "");
}

// ── day input parser (supports ranges, month boundary) ────────────────────────
// "30-2" means 30,31 of month1 then 1,2 of month2 (stored as 32,33)
function expandDayList(raw) {
  const tokens = raw.trim().split(/[\s,]+/).filter(Boolean);
  const days = [];
  for (const tok of tokens) {
    const nextMonth = tok.startsWith("+");
    const clean = nextMonth ? tok.slice(1) : tok;
    const offset = nextMonth ? NEXT_MONTH_OFFSET : 0;

    const rangeMatch = clean.match(/^(\d{1,2})-(\d{1,2})$/);
    if (rangeMatch) {
      let s = parseInt(rangeMatch[1]), e = parseInt(rangeMatch[2]);
      if (!isNaN(s) && !isNaN(e)) {
        if (!nextMonth && e < s) e += NEXT_MONTH_OFFSET; // crosses month boundary
        for (let d = s + offset; d <= e + offset; d++) days.push(d);
        continue;
      }
    }
    const m = clean.match(/^(\d{1,2})$/);
    if (m) days.push(parseInt(m[1]) + offset);
  }
  return [...new Set(days)].sort((a,b)=>a-b);
}

// ── parsers ───────────────────────────────────────────────────────────────────
function getMonthInfo(text) {
  const m = text.match(DATE_RE);
  if (!m) return { monthIdx: -1, monthName: "", startDay: 0 };
  const monthName = m[2].toUpperCase();
  const monthIdx = MONTH_MAP[monthName] ?? -1;
  const yearMatch = text.match(/20\d{2}/);
  const year = yearMatch ? parseInt(yearMatch[0]) : new Date().getFullYear();
  const startDay = monthIdx >= 0 ? new Date(year, monthIdx, 1).getDay() : 0;
  return { monthIdx, monthName, startDay };
}

function parseReserveGrid(text, offset) {
  const g = {};
  for (const line of text.split("\n")) {
    const parts = line.trim().split(/\t+|\s{2,}/);
    if (parts.length < 5) continue;
    const dm = parts[0].match(DATE_RE);
    if (!dm) continue;
    const day = parseInt(dm[1]) + offset;
    const net = parseInt(parts[3]);
    const minReq = parseInt(parts[4]);
    if (!isNaN(day) && !isNaN(net)) g[day] = { net, minReq: isNaN(minReq) ? 47 : minReq };
  }
  return g;
}

function parseOpenTime(text, offset) {
  const seen = new Set(), results = [];
  for (const line of text.split("\n")) {
    if (line.includes("TradeBoard") || line.includes("Click to view") || line.startsWith("Pairing")) continue;
    const dm = line.match(DATE_RE);
    if (!dm) continue;
    const start = parseInt(dm[1]) + offset;
    let parts = line.split("\t").map(p => p.trim()).filter(p => p.length);
    if (parts.length < 3) {
      const afterDate = line.slice(line.indexOf(dm[0]) + dm[0].length);
      const numMatch = afterDate.match(/\s*(\d{1,2})\s/);
      if (numMatch) parts = ["", "", numMatch[1]];
    }
    if (parts.length < 3) continue;
    const length = parseInt(parts[2]);
    if (isNaN(length) || length < 1 || length > 6) continue;
    const key = start + "x" + length;
    if (seen.has(key)) continue;
    seen.add(key);
    results.push({ start, length });
  }
  return results;
}

// ── optimizer ─────────────────────────────────────────────────────────────────
function optimize(grid, openTime, minDays, maxDays, droppingDays, fixedDays, preferOff) {
  const gridDays = new Set(Object.keys(grid).map(Number));
  const safe = openTime.filter(c => 
    !tripDays(c.start, c.length).some(d => fixedDays.includes(d)) &&
    tripDays(c.start, c.length).every(d => gridDays.has(d))
  );
  const results = [];

  function search(index, chosen, daysUsed) {
    if (daysUsed >= minDays) {
      if (!hasOverlap(chosen) && maxConsecutive(chosen, fixedDays) <= 6) {
        const pickingUpDays = chosen.flatMap(t => tripDays(t.start, t.length));
        const onlyDrop = droppingDays.filter(d => !pickingUpDays.includes(d));
        const onlyAdd = pickingUpDays.filter(d => !droppingDays.includes(d));
        const changedDays = [...onlyDrop, ...onlyAdd];

        let worstBefore = 0, worstAfter = 0;
        if (changedDays.length > 0) {
          worstBefore = Infinity; worstAfter = Infinity;
          for (const d of changedDays) {
            const buf = getBuffer(grid, d);
            worstBefore = Math.min(worstBefore, buf);
            worstAfter = Math.min(worstAfter, onlyDrop.includes(d) ? buf - 1 : buf + 1);
          }
        }

        const dropSum = onlyDrop.reduce((s, d) => s + getBuffer(grid, d), 0);
        const addSum = onlyAdd.reduce((s, d) => s + getBuffer(grid, d), 0);

        if (worstAfter >= worstBefore && addSum <= dropSum && (onlyDrop.length > 0 || onlyAdd.length > 0)) {
          results.push({ trips: [...chosen], worstBefore, worstAfter, onlyDrop, onlyAdd, dropSum, addSum });
        }
      }
      return;
    }
    if (index >= safe.length || results.length > 500) return;
    for (let i = index; i < safe.length; i++) {
      const c = safe[i];
      if (daysUsed + c.length <= maxDays) {
        chosen.push(c);
        search(i + 1, chosen, daysUsed + c.length);
        chosen.pop();
      }
    }
  }
  search(0, [], 0);

  const seen = new Set();
  // Filter out results identical to current schedule
  const droppingSet = droppingDays.slice().sort((a,b)=>a-b).join(",");
  const unique = results.filter(r => {
    const key = r.trips.map(t => t.start + "x" + t.length).sort().join("|");
    if (seen.has(key)) return false;
    seen.add(key); return true;
  }).filter(r => {
    const newDays = r.trips.flatMap(t => tripDays(t.start, t.length)).sort((a,b)=>a-b).join(",");
    return newDays !== droppingSet;
  });

  unique.sort((a, b) => (a.addSum - a.dropSum) - (b.addSum - b.dropSum));

  unique.forEach(r => {
    const wd = r.trips.flatMap(t => tripDays(t.start, t.length));
    const conflicts = preferOff.filter(d => wd.includes(d));
    r.prefSatisfied = preferOff.length > 0 ? conflicts.length === 0 : null;
    r.prefPartial = preferOff.length > 0 ? (conflicts.length > 0 && conflicts.length < preferOff.length) : null;
    r.prefConflicts = conflicts;
  });

  return unique.slice(0, 50);
}

// ── calendar ──────────────────────────────────────────────────────────────────
const DOW = ["SU","MO","TU","WE","TH","FR","SA"];
const COLORS = ["#2563eb","#16a34a","#9333ea","#ea580c","#0891b2","#be185d","#ca8a04"];

function Calendar({ trips, fixedDays, preferOff, month1Start, month1Name, month2Name }) {
  const wMap = {};
  trips.forEach((t, ti) => tripDays(t.start, t.length).forEach(d => { wMap[d] = ti; }));
  fixedDays.forEach(d => { wMap[d] = "fixed"; });

  const dualMonth = month2Name && trips.some(t => t.start + t.length - 1 > 31);
  const cells1 = [...Array(month1Start).fill(null), ...Array.from({length:31},(_,i)=>i+1)];

  // Calculate next month start day
  const month2Start = (month1Start + 31) % 7;
  const cells2 = [...Array(month2Start).fill(null), ...Array.from({length:31},(_,i)=>i+32)];

  function renderCell(d, i) {
    if (!d) return <div key={"e"+i}/>;
    const ti = wMap[d];
    const isFixed = ti==="fixed", isWork = ti!==undefined;
    const isPref = preferOff && preferOff.includes(d);
    const bg = isFixed?"#374151":isWork?COLORS[ti%COLORS.length]:isPref?"#fef3c7":"#f9fafb";
    const color = (isWork||isFixed)?"#fff":isPref?"#92400e":"#374151";
    const label = d > 31 ? d - NEXT_MONTH_OFFSET : d;
    return <div key={d} style={{background:bg,color,borderRadius:4,padding:"5px 2px",textAlign:"center",fontSize:11,fontWeight:isWork?700:400,border:(isPref&&!isWork)?"1px solid #fbbf24":"1px solid transparent"}}>{label}</div>;
  }

  return (
    <div style={{marginTop:10}}>
      {month1Name && <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:4}}>{month1Name}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
        {DOW.map(d => <div key={d} style={{textAlign:"center",fontSize:10,color:"#6b7280",fontWeight:700}}>{d}</div>)}
        {cells1.map((d,i) => renderCell(d,i))}
      </div>
      {dualMonth && month2Name && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",margin:"8px 0 4px"}}>{month2Name}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
            {DOW.map(d => <div key={"n"+d} style={{textAlign:"center",fontSize:10,color:"#6b7280",fontWeight:700}}>{d}</div>)}
            {cells2.map((d,i) => renderCell(d,i))}
          </div>
        </>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,fontSize:11,marginTop:4}}>
        {trips.map((t,ti) => (
          <span key={ti} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:10,height:10,borderRadius:2,background:COLORS[ti%COLORS.length],display:"inline-block"}}/>
            {formatDay(t.start,month1Name,month2Name)}-{formatDay(t.start+t.length-1,month1Name,month2Name)} ({t.length}d)
          </span>
        ))}
        {fixedDays.length>0&&<span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:2,background:"#374151",display:"inline-block"}}/>Fixed</span>}
        {preferOff&&preferOff.length>0&&<span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:2,background:"#fbbf24",display:"inline-block"}}/>Preferred off</span>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [grid1Paste, setGrid1Paste] = useState("");
  const [grid2Paste, setGrid2Paste] = useState("");
  const [grid, setGrid] = useState(null);
  const [gridError, setGridError] = useState("");
  const [month1Name, setMonth1Name] = useState("");
  const [month2Name, setMonth2Name] = useState("");
  const [month1Start, setMonth1Start] = useState(0);

  const [workingRaw, setWorkingRaw] = useState("");
  const [currentScore, setCurrentScore] = useState(null);

  const [ot1Paste, setOt1Paste] = useState("");
  const [ot2Paste, setOt2Paste] = useState("");
  const [openTime, setOpenTime] = useState(null);
  const [otError, setOtError] = useState("");

  const [minDays, setMinDays] = useState("");
  const [maxDays, setMaxDays] = useState("");
  const [fixedRaw, setFixedRaw] = useState("");
  const [avoidBefore, setAvoidBefore] = useState("");

  const [results, setResults] = useState(null);
  const [running, setRunning] = useState(false);
  const [selected, setSelected] = useState(null);

  function handleParseGrid() {
    const info1 = getMonthInfo(grid1Paste);
    const g1 = parseReserveGrid(grid1Paste, 0);
    const g2 = grid2Paste ? parseReserveGrid(grid2Paste, NEXT_MONTH_OFFSET) : {};
    const combined = { ...g1, ...g2 };
    if (!Object.keys(combined).length) { setGridError("No data found."); return; }
    setGrid(combined); setGridError(""); setCurrentScore(null);
    setMonth1Name(info1.monthName);
    setMonth1Start(info1.startDay);
    if (grid2Paste) {
      const info2 = getMonthInfo(grid2Paste);
      setMonth2Name(info2.monthName);
    } else {
      setMonth2Name("");
    }
  }

  function handleCalcScore() {
    if (!grid) return;
    const days = expandDayList(workingRaw);
    setCurrentScore(days.reduce((s, d) => s + getNet(grid, d), 0));
  }

  function handleParseOT() {
    const trips1 = parseOpenTime(ot1Paste, 0);
    const trips2 = ot2Paste ? parseOpenTime(ot2Paste, NEXT_MONTH_OFFSET) : [];
    const all = [...trips1, ...trips2];
    const seen = new Set();
    const deduped = all.filter(t => {
      const k = t.start + "x" + t.length;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    }).sort((a,b) => a.start - b.start || a.length - b.length);
    if (!deduped.length) { setOtError("No trips found."); return; }
    setOpenTime(deduped); setOtError("");
  }

  function handleRun() {
    setRunning(true); setResults(null); setSelected(null);
    const fixedDays = expandDayList(fixedRaw);
    const min = parseInt(minDays) || 0;
    const max = parseInt(maxDays) || 99;
    const preferOff = expandDayList(avoidBefore);
    const droppingDays = expandDayList(workingRaw);
    setTimeout(() => {
      setResults(optimize(grid, openTime, min, max, droppingDays, fixedDays, preferOff));
      setRunning(false);
    }, 50);
  }

  const fixedDaysParsed = expandDayList(fixedRaw);
  const preferOffParsed = expandDayList(avoidBefore);
  const canRun = grid && openTime && currentScore !== null && minDays && !running;

  const card = {background:"#fff",borderRadius:10,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"};
  const lbl = {fontSize:12,fontWeight:700,color:"#374151",marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:"0.05em"};
  const inp = {width:"100%",padding:"8px 10px",borderRadius:6,border:"1.5px solid #e5e7eb",fontSize:"16px",boxSizing:"border-box"};
  const btn = (off) => ({padding:"10px 20px",borderRadius:6,border:"none",cursor:off?"not-allowed":"pointer",fontWeight:700,fontSize:14,background:off?"#e5e7eb":"#1d4ed8",color:off?"#9ca3af":"#fff"});

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <div style={{background:"#0f172a",padding:"18px 24px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{fontSize:22}}>✈️</div>
        <div>
          <div style={{color:"#f8fafc",fontWeight:800,fontSize:17}}>Endeavor Schedule Optimizer</div>
        </div>
      </div>

      <div style={{padding:16,maxWidth:640,margin:"0 auto"}}>

        {/* Step 1 - Reserve Grid */}
        <div style={card}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:"#0f172a"}}>1 — Reserve Grid</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:8}}>Paste current month grid. Also paste next month's grid below if needed.</div>
          <label style={lbl}>Current month</label>
          <textarea style={{...inp,height:100,resize:"vertical"}} placeholder={"01AUG\t23\t1\t22\t46\t44\n02AUG\t24\t6\t18\t46\t44"} value={grid1Paste} onChange={e=>setGrid1Paste(e.target.value)}/>
          <label style={{...lbl,marginTop:12}}>Next month (optional)</label>
          <textarea style={{...inp,height:80,resize:"vertical"}} placeholder={"01SEP\t30\t2\t28\t47\t45\n02SEP\t31\t3\t28\t47\t45"} value={grid2Paste} onChange={e=>setGrid2Paste(e.target.value)}/>
          <button style={{...btn(!grid1Paste),marginTop:8}} disabled={!grid1Paste} onClick={handleParseGrid}>Parse Grid</button>
          {gridError && <div style={{color:"#dc2626",fontSize:13,marginTop:8}}>{gridError}</div>}
          {grid && (
            <div style={{marginTop:10,background:"#f8fafc",borderRadius:6,padding:10}}>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>✓ {Object.keys(grid).length} days loaded {month1Name}{month2Name ? " + " + month2Name : ""}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {Object.entries(grid).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([d,v]) => (
                  <span key={d} style={{fontSize:11,background:"#fff",border:"1px solid #e5e7eb",borderRadius:4,padding:"2px 6px",fontFamily:"monospace"}}>
                    {formatDay(parseInt(d),month1Name,month2Name)}:<b style={{color:"#dc2626"}}>{v.net}</b>
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Step 2 - Working Days */}
        <div style={card}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:8,color:"#0f172a"}}>2 — Current Working Days</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:8}}>Supports ranges like 3-6, boundary crossing like 30-2, and next month days with + like +24-27. Don't include fixed trips.</div>
          <textarea style={{...inp,height:80,resize:"vertical"}} placeholder="6-9   13-16   21-24   27-30   +1-4" value={workingRaw} onChange={e=>{setWorkingRaw(e.target.value);setCurrentScore(null);}}/>
          <button style={{...btn(!grid||!workingRaw),marginTop:8}} disabled={!grid||!workingRaw} onClick={handleCalcScore}>Calculate Score</button>
          {currentScore !== null && (
            <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,color:"#374151"}}>Current value:</span>
              <span style={{fontWeight:800,fontSize:22,color:"#dc2626"}}>{currentScore}</span>
            </div>
          )}
        </div>

        {/* Step 3 - Open Time */}
        <div style={card}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:"#0f172a"}}>3 — Open Time</div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:8}}>Paste current month open time. Also paste next month below if needed. TB trips are filtered automatically.</div>
          <label style={lbl}>Current month</label>
          <textarea style={{...inp,height:100,resize:"vertical",fontSize:11}} placeholder="Paste current month Flica open time here…" value={ot1Paste} onChange={e=>{setOt1Paste(e.target.value);setOpenTime(null);setOtError("");}}/>
          <label style={{...lbl,marginTop:12}}>Next month (optional)</label>
          <textarea style={{...inp,height:80,resize:"vertical",fontSize:11}} placeholder="Paste next month Flica open time here…" value={ot2Paste} onChange={e=>{setOt2Paste(e.target.value);setOpenTime(null);setOtError("");}}/>
          <button style={{...btn(!ot1Paste),marginTop:8}} disabled={!ot1Paste} onClick={handleParseOT}>Parse Open Time</button>
          {otError && <div style={{color:"#dc2626",fontSize:13,marginTop:8}}>{otError}</div>}
          {openTime && (
            <div style={{marginTop:10,background:"#f8fafc",borderRadius:6,padding:10}}>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>✓ {openTime.length} available trips</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {openTime.map((t,i) => (
                  <span key={i} style={{fontSize:11,background:"#fff",border:"1px solid #e5e7eb",borderRadius:4,padding:"2px 6px",fontFamily:"monospace"}}>
                    {formatDay(t.start,month1Name,month2Name)}·{t.length}d
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Step 4 - Parameters */}
        <div style={card}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:12,color:"#0f172a"}}>4 — Parameters</div>
          <label style={lbl}>Days to pick up (range)</label>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input style={{...inp,width:"45%"}} type="number" placeholder="min e.g. 16" value={minDays} onChange={e=>setMinDays(e.target.value)}/>
            <span style={{color:"#6b7280",fontSize:13}}>to</span>
            <input style={{...inp,width:"45%"}} type="number" placeholder="max e.g. 18" value={maxDays} onChange={e=>setMaxDays(e.target.value)}/>
          </div>
          <label style={{...lbl,marginTop:12}}>Fixed days (can't move)</label>
          <input style={inp} placeholder="e.g. 30-31 +1-2" value={fixedRaw} onChange={e=>setFixedRaw(e.target.value)}/>
          <label style={{...lbl,marginTop:12}}>Prefer days off (optional)</label>
          <input style={inp} placeholder="e.g. 2-9" value={avoidBefore} onChange={e=>setAvoidBefore(e.target.value)}/>
          <button style={{...btn(!canRun),marginTop:16,width:"100%"}} disabled={!canRun} onClick={handleRun}>
            {running?"Running…":"Find Optimal Schedules"}
          </button>
        </div>

        {/* Results */}
        {results !== null && (
          <div style={card}>
            <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:"#0f172a"}}>Results</div>
            {results.length===0
              ? <div style={{color:"#6b7280",fontSize:13}}>No valid schedules found. Try relaxing preferences or check open time.</div>
              : (
                <div>
                  <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{results.length} valid schedule{results.length!==1?"s":""} found, best company benefit first.</div>
                  {results.map((r,i) => (
                    <div key={i} onClick={()=>setSelected(selected===i?null:i)}
                      style={{border:selected===i?"2px solid #2563eb":"1.5px solid #e5e7eb",borderRadius:8,padding:12,marginBottom:8,cursor:"pointer",background:selected===i?"#eff6ff":"#fff"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                        <span style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>#{i+1}</span>
                        <span style={{fontSize:12,fontWeight:700,color:"#16a34a"}}>benefit: {r.dropSum - r.addSum}</span>
                        <span style={{fontSize:11,color:"#6b7280"}}>drop:{r.onlyDrop.map(d=>formatDay(d,month1Name,month2Name)).join(",")} add:{r.onlyAdd.map(d=>formatDay(d,month1Name,month2Name)).join(",")}</span>
                        <span style={{background:"#6b7280",color:"#fff",borderRadius:4,padding:"2px 6px",fontSize:11,fontWeight:700}}>worst:{r.worstBefore}→{r.worstAfter}</span>
                        {r.prefSatisfied && <span style={{background:"#16a34a",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>✓ days off</span>}
                        {r.prefPartial && <span style={{background:"#ca8a04",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>works {r.prefConflicts.map(d=>formatDay(d,month1Name,month2Name)).join(",")}</span>}
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {r.trips.map((t,ti) => (
                          <span key={ti} style={{fontSize:12,background:"#f1f5f9",borderRadius:4,padding:"3px 8px",fontFamily:"monospace"}}>
                            {formatDay(t.start,month1Name,month2Name)}-{formatDay(t.start+t.length-1,month1Name,month2Name)} ({t.length}d)
                          </span>
                        ))}
                      </div>
                      {selected===i && <Calendar trips={r.trips} fixedDays={fixedDaysParsed} preferOff={preferOffParsed} month1Start={month1Start} month1Name={month1Name} month2Name={month2Name}/>}
                    </div>
                  ))}
                </div>
              )
            }
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
